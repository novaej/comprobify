name: Notification Scheduler (Staging)

# DISABLED — running every 5 minutes would consume ~8,640 GitHub Actions minutes/month,
# exceeding the 2,000 free-plan limit. See NEXT_STEPS.md for alternatives.
#
# To enable: uncomment the `schedule` trigger below and remove the `if: false` guard,
# after choosing an appropriate interval or switching to an external cron service.
on:
  # schedule:
  #   - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    environment: staging
    if: false  # remove this line to re-enable

    steps:
      - name: Trigger notification job
        run: |
          curl -s --fail -X POST "${{ secrets.STAGING_API_BASE_URL }}/api/admin/jobs/notifications" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}"
