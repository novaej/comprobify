name: Deploy Production

# DISABLED — the production droplet and secrets do not exist yet (see
# docs/deployment.md's "Production status"). This mirrors deploy-staging.yml so it's
# ready to enable once terraform/environments/production is provisioned.
#
# To enable:
#   1. Uncomment the `push` trigger below
#   2. Remove the `if: false` guard on the `deploy` job
#   3. Set up the `production` GitHub Environment's Secrets/Variables (same full set as
#      `staging` — see docs/terraform-digitalocean-setup.md's env var reference table),
#      including DROPLET_IP and INFRA_SSH_PRIVATE_KEY (same secret names as `staging`'s
#      Environment — differentiated by which Environment the job declares, not by name)
#   4. Confirm `username:` below matches `deploy_username` in
#      terraform/environments/production/terraform.tfvars
on:
  # push:
  #   branches: [production]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: false  # remove this line to re-enable
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Copy compose files to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: cpfydeploy9x
          key: ${{ secrets.INFRA_SSH_PRIVATE_KEY }}
          source: "deploy/docker-compose.yml,deploy/Caddyfile"
          target: /opt/comprobify
          strip_components: 1

      - name: Write env and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: cpfydeploy9x
          key: ${{ secrets.INFRA_SSH_PRIVATE_KEY }}
          script: |
            cat > /opt/comprobify/.env <<'EOF'
            APP_ENV=${{ vars.APP_ENV }}
            APP_BASE_URL=${{ vars.APP_BASE_URL }}
            API_BASE_URL=${{ vars.APP_BASE_URL }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_SSL=${{ vars.DB_SSL }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}
            EMAIL_FROM=${{ vars.EMAIL_FROM }}
            MAILGUN_API_KEY=${{ secrets.MAILGUN_API_KEY }}
            MAILGUN_DOMAIN=${{ vars.MAILGUN_DOMAIN }}
            MAILGUN_WEBHOOK_SIGNING_KEY=${{ secrets.MAILGUN_WEBHOOK_SIGNING_KEY }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            BANK_TRANSFER_BANK_NAME=${{ vars.BANK_TRANSFER_BANK_NAME }}
            BANK_TRANSFER_ACCOUNT_TYPE=${{ vars.BANK_TRANSFER_ACCOUNT_TYPE }}
            BANK_TRANSFER_ACCOUNT_NUMBER=${{ vars.BANK_TRANSFER_ACCOUNT_NUMBER }}
            BANK_TRANSFER_ACCOUNT_HOLDER=${{ vars.BANK_TRANSFER_ACCOUNT_HOLDER }}
            BANK_TRANSFER_IDENTIFICATION=${{ vars.BANK_TRANSFER_IDENTIFICATION }}
            ADMIN_NOTIFICATION_EMAIL=${{ vars.ADMIN_NOTIFICATION_EMAIL }}
            OPERATOR_NAME=${{ vars.OPERATOR_NAME }}
            OPERATOR_RUC=${{ vars.OPERATOR_RUC }}
            OPERATOR_EMAIL=${{ vars.OPERATOR_EMAIL }}
            OPERATOR_ADDRESS=${{ vars.OPERATOR_ADDRESS }}
            RABBITMQ_URL=${{ secrets.RABBITMQ_URL }}
            EOF
            chmod 600 /opt/comprobify/.env
            cd /opt/comprobify
            export IMAGE_TAG=${{ github.sha }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
