name: Terraform

# Applies infrastructure changes under terraform/ - separate from and never triggered by
# deploy-staging.yml/deploy-production.yml (those only ship application code, never touch
# Terraform). See docs/terraform-digitalocean-setup.md's "CI/CD (GitHub Actions)" section.
#
# DO_TOKEN and CLOUDFLARE_TOKEN live in the `staging-infra` GitHub Environment (Settings ->
# Environments -> staging-infra), unprefixed - same convention deploy-staging.yml already
# uses for DB_HOST/ADMIN_SECRET/etc: one secret name, a different value per Environment,
# not a name per environment. The comprobify-terraform-staging and comprobify-terraform-
# production credentials (see the Prerequisites table in terraform-digitalocean-setup.md)
# are deliberately separate tokens - `staging-infra` holds the staging value, and the
# not-yet-created `production-infra` Environment will hold the production value under the
# exact same secret names, DO_TOKEN/CLOUDFLARE_TOKEN, once that job pair exists.
#
# Both `plan` and `apply` declare `environment: staging-infra` - unlike an earlier draft
# that only gated `apply`, this means a required-reviewer rule added to staging-infra (repo
# Settings -> Environments -> staging-infra -> add yourself as a required reviewer) would
# gate `plan` too, i.e. you'd approve before seeing the diff, not after. Deliberate
# trade-off for staying consistent with deploy-staging.yml's single-environment shape
# instead of introducing a second, plan-only Environment just to keep plan ungated.
#
# The Spaces state-backend credentials (TERRAFORM_SPACES_ACCESS_KEY_ID/SECRET_ACCESS_KEY)
# are the exception and stay as REPOSITORY secrets, not Environment secrets - staging and
# production share one state bucket with different key prefixes (see "Remote state" in
# terraform-digitalocean-setup.md) via one Spaces key pair created once, so there's only
# ever one correct value, and every job (regardless of which Environment it declares) needs
# it. They keep the TERRAFORM_ prefix because, as repository secrets, they sit in the same
# flat Secrets list as docs.yml's unrelated DOCS_CLOUDFLARE_* pair - Environment secrets
# don't have that collision risk since they're scoped to their own Environment's page in
# the GitHub UI, which is why DO_TOKEN/CLOUDFLARE_TOKEN don't need the prefix.
#
# Production's job pair isn't here yet - terraform/environments/production doesn't exist.
# Add a near-identical plan/apply pair pointed at it (environment: production-infra) once
# it's provisioned, reading the same DO_TOKEN/CLOUDFLARE_TOKEN names from that Environment
# and the same shared TERRAFORM_SPACES_* repository secrets.

on:
  push:
    branches: [main]
    paths: ['terraform/**']
  workflow_dispatch: {}

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: staging-infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - run: terraform -chdir=terraform/environments/staging init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_SPACES_SECRET_ACCESS_KEY }}
      - run: terraform -chdir=terraform/environments/staging plan
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_cloudflare_token: ${{ secrets.CLOUDFLARE_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_SPACES_SECRET_ACCESS_KEY }}

  apply:
    needs: plan
    environment: staging-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - run: terraform -chdir=terraform/environments/staging init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_SPACES_SECRET_ACCESS_KEY }}
      - run: terraform -chdir=terraform/environments/staging apply -auto-approve
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_cloudflare_token: ${{ secrets.CLOUDFLARE_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TERRAFORM_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TERRAFORM_SPACES_SECRET_ACCESS_KEY }}
