name: Release to Staging

# Promotes a tagged commit on `main` to the `staging` branch by fast-forwarding
# it to the tag. Pushing `staging` then triggers deploy-staging.yml automatically.
#
# A tag means: "build this, validate it in staging."
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PUSH_TOKEN }}

      - name: Fast-forward staging to this tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout staging
          git merge --ff-only "${{ github.ref_name }}"
          git push origin staging
