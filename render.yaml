# Render Blueprint — scheduled (cron) jobs, plus the RabbitMQ worker.
#
# The API web services (comprobify-staging / comprobify-production) are
# deliberately NOT declared here — they stay on the existing GitHub Actions
# deploy-hook pipeline documented in docs/deployment.md. Only the low-risk,
# low-env-var-count cron jobs are managed as code, so a new scheduled job
# going forward is "add a service block below + push" instead of a manual
# Render dashboard step.
#
# workers/sri-worker.js (see ADR-019) is declared here
# too, as a `type: worker` (Background Worker) service — unlike the cron jobs,
# it's a long-running process, not a scheduled one-shot. `type: worker` is
# Render's documented Blueprint type for this, but — unlike the cron job
# fields below, which are confirmed against a real deploy — this block has
# NOT yet been synced/tested against the actual Render dashboard. Verify the
# service type and field names there before relying on this to work as
# written; if the sync produces something unexpected, create the Background
# Worker by hand in the dashboard first (same recovery path used originally
# for the 3 cron jobs — see "Adopting the 3 jobs that already exist" in
# docs/deployment.md), then adjust this block to adopt it by exact name.
#
# Services are declared at the ROOT level (not nested under a `projects`/
# `environments` block) specifically because Render's own docs guarantee:
# "Services in this top-level list keep their currently assigned environment
# (if any) after each sync." Confirmed: adopting a pre-existing resource by
# exact name preserves its environment placement. Confirmed the OPPOSITE
# too: a brand-new resource (no prior assignment) does NOT get auto-placed
# into an existing Project/Environment — it lands ungrouped, and needs one
# manual "move into Staging" step per resource in the dashboard after
# Render creates it.
#
# ADMIN_SECRET is intentionally NOT declared anywhere in this file. Render's
# envVarGroups do not support `sync: false` — a secret placed there via YAML
# is silently dropped (confirmed: it never appeared in the group, no error,
# no prompt). Instead, ADMIN_SECRET was added directly to the
# comprobify-cron-staging group by hand, in the Render dashboard, outside
# Blueprint management entirely — CONFIRMED to survive a Blueprint sync
# (a group variable absent from render.yaml is left alone on sync, the same
# guarantee Render's docs give for whole resources removed from the YAML,
# now confirmed to extend to individual group keys too). Every current and
# future cron job referencing this group inherits ADMIN_SECRET with zero
# dashboard steps. Do not add `key: ADMIN_SECRET` to this file — it would
# have no effect on the group (unsupported) and, if added per-service
# instead, would be redundant with what's already set on the group.
#
# Production cron jobs aren't declared yet — the production web service,
# branch, and secrets don't exist yet either (see docs/deployment.md's
# "Production status").

envVarGroups:
  - name: comprobify-cron-staging
    envVars:
      - key: API_BASE_URL
        value: https://api-staging.comprobify.com
      # ADMIN_SECRET is deliberately absent here — see note above. It exists
      # in this group in the Render dashboard, set by hand, not via this
      # file, and confirmed to survive a Blueprint sync as-is.

  # For the worker service only. sri-worker.js runs
  # src/config/validate.js's validateCoreConfig() at startup — a narrower
  # check than the API's own validateConfig(), covering only what the
  # worker's message handlers actually touch: DB_*, RABBITMQ_URL, and
  # MAILGUN_API_KEY/MAILGUN_DOMAIN/EMAIL_FROM (the worker is what actually
  # sends the invoice-authorized email). It deliberately does NOT need
  # ENCRYPTION_KEY, ADMIN_SECRET, APP_BASE_URL, BANK_TRANSFER_*,
  # ADMIN_NOTIFICATION_EMAIL, or MAILGUN_WEBHOOK_SIGNING_KEY — those only
  # back API-only routes/services (admin auth, certificate decryption,
  # billing, inbound webhook verification) the worker never reaches. None of
  # the real values are declared here — same reasoning as ADMIN_SECRET
  # above — they must be added by hand in the Render dashboard, on this
  # group.
  - name: comprobify-worker-staging
    envVars:
      - key: APP_ENV
        value: staging

services:
  - name: comprobify-staging-notifications
    type: cron
    runtime: docker
    region: virginia
    branch: staging
    plan: starter
    schedule: "*/5 * * * *"
    dockerCommand: node scripts/run-admin-job.js /v1/admin/jobs/notifications
    envVars:
      - fromGroup: comprobify-cron-staging

  - name: comprobify-staging-subscriptions
    type: cron
    runtime: docker
    region: virginia
    branch: staging
    plan: starter
    schedule: "0 6 * * *"
    dockerCommand: node scripts/run-admin-job.js /v1/admin/jobs/subscriptions
    envVars:
      - fromGroup: comprobify-cron-staging

  - name: comprobify-staging-quota
    type: cron
    runtime: docker
    region: virginia
    branch: staging
    plan: starter
    schedule: "10 6 * * *"
    dockerCommand: node scripts/run-admin-job.js /v1/admin/jobs/quota
    envVars:
      - fromGroup: comprobify-cron-staging

  # Shorter cadence than the other three — this is the recovery mechanism
  # for a temporarily unreachable broker or a publish that timed out (see
  # ADR-019). Hourly, not every-few-minutes: CloudAMQP is a managed
  # service that rarely fails outright, and the worker still processes
  # anything already queued near-instantly — this cadence only bounds how
  # long a document can sit unprocessed if nothing ever queued a message
  # for it at all (a stuck publish, or a RECEIVED document nobody polled).
  - name: comprobify-staging-queue-reconciliation
    type: cron
    runtime: docker
    region: virginia
    branch: staging
    plan: starter
    schedule: "0 * * * *"
    dockerCommand: node scripts/run-admin-job.js /v1/admin/jobs/queue-reconciliation
    envVars:
      - fromGroup: comprobify-cron-staging

  # Long-running RabbitMQ consumer (workers/sri-worker.js) — NOT a scheduled
  # job. See the header comment above: this block's exact field names are
  # unverified against a real Render sync.
  - name: comprobify-staging-sri-worker
    type: worker
    runtime: docker
    region: virginia
    branch: staging
    plan: starter
    dockerCommand: node workers/sri-worker.js
    envVars:
      - fromGroup: comprobify-worker-staging
